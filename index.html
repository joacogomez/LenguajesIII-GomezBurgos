<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Página</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  
</head>


<body>

  
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Sobre mí</a>
    <a href="#">Proyectos</a>
    <a href="#">Contacto</a>
  </nav>

  <header>
    <div id="miCarousel" class="carousel slide" data-bs-ride="carousel">

      <!-- Indicadores (los puntitos de abajo) -->
      <div class="carousel-indicators">
        <button data-bs-target="#miCarousel" data-bs-slide-to="0" class="active"></button>
        <button data-bs-target="#miCarousel" data-bs-slide-to="1"></button>
        <button data-bs-target="#miCarousel" data-bs-slide-to="2"></button>
      </div>
    
      <!-- Las imágenes -->
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="img/imagen1.jpg" class="d-block w-100" alt="Imagen 1">
        </div>
        <div class="carousel-item">
          <img src="img/imagen2.webp" class="d-block w-100" alt="Imagen 2">
        </div>
        <div class="carousel-item">
          <img src="img/imagen3.webp" class="d-block w-100" alt="Imagen 3">
        </div>
      </div>
    
      <!-- Botones laterales -->
      <button class="carousel-control-prev" data-bs-target="#miCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" data-bs-target="#miCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    
    </div>
  </header>

  
  <main class="container mt-4">
    <h1>Mi página - Lenguajes III</h1>
    <h4>Hecha con HTML y CSS</h4>

    <div class="grilla">
      <div class="tarjeta">
        <h3>Tarjeta 1</h3>
        <p>Contenido de la primera tarjeta.</p>
      </div>
      <div class="tarjeta">
        <h3>Tarjeta 2</h3>
        <p>Contenido de la segunda tarjeta.</p>
      </div>
      <div class="tarjeta">
        <h3>Tarjeta 3</h3>
        <p>Contenido de la tercera tarjeta.</p>
      </div>
    </div>

  </main>
